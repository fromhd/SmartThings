  - id: hyukjoo
    label: HyukJoo
    capabilities:
      - id: presenceSensor
        version: 1
    categories:
      - name: PresenceSensor
preferences:
  - title: "OpenWRT IP"
    name: openwrtIp
    description: "공유기 LAN IP (예: 192.168.1.1)"
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: "192.168.1.1"
  - title: "OpenWRT Port"
    name: openwrtPort
    description: "presence_server.py 포트 (기본 8091)"
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: "8091"
  - title: "폴링 주기 (초)"
    name: pollInterval
    description: "재실 상태 확인 간격 (기본 30초)"
    required: true
    preferenceType: number
    definition:
      minimum: 10
      maximum: 300
      default: 30
deviceConfig:
  dashboard:
    states:
