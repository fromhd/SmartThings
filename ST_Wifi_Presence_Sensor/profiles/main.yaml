name: main
components:
  - id: main
    label: "집 재실"
    capabilities:
      - id: presenceSensor
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: PresenceSensor
  - id: diego
    label: Diego
    capabilities:
      - id: presenceSensor
        version: 1
    categories:
      - name: PresenceSensor
  - id: jinee
    label: Jinee
    capabilities:
      - id: presenceSensor
        version: 1
    categories:
      - name: PresenceSensor
  - id: yoojoo
    label: YooJoo
    capabilities:
      - id: presenceSensor
        version: 1
    categories:
